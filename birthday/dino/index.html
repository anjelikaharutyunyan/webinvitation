<!doctype html>
<html lang="hy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Dino Birthday Invitation | Webinvitation.am</title>
    <meta
      name="description"
      content="Dino Birthday Invitation — Ծննդյան Հրավիրատոմս webinvitation.am"
    />
    <!-- OPEN GRAPH META TAGS -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://webinvitation.am/birthday/dino/" />
    <meta property="og:title" content="Dino Birthday Invitation" />
    <meta
      property="og:image"
      content="https://webinvitation.am/birthday/dino/images/boy.jpg"
    />
    <meta
      property="og:description"
      content="Ծննդյան Հրավիրատոմս webinvitation.am"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- TWITTER CARDS -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dino Birthday Invitation" />
    <meta
      name="twitter:description"
      content="Ծննդյան Հրավիրատոմս webinvitation.am"
    />
    <meta
      name="twitter:image"
      content="https://webinvitation.am/birthday/dino/images/boy.jpg"
    />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
  </head>
  <body>
    <section class="happy-birthday">
      <img src="./images/salut.png" class="salut left" />
      <img src="./images/baloons.png" class="baloons" />
      <img src="./images/salut.png" class="salut right" />
    </section>

    <section class="invite">
      <div class="boy-container">
        <img src="./images/boy.jpg" class="boy" />
        <img src="./images/year.png" class="three" />
      </div>
      <div class="invitation-info">
        <h1
          class="child-name aos-init aos-animate"
          data-aos="zoom-in"
          data-aos-duration="800"
        >
          ԴԱՎԻԹ
        </h1>
        <p class="date-time wow flipInX">
          Եկեք մեզ հետ կիսելու մեր ուրախությունը: Մեր Դավիթը դառնում է 3
          տարեկան: Կլինեն խաղեր, տորթ, զվարճանքներ և բազում անակնկալներ:
        </p>
        <img
          class="detail-3 aos-init aos-animate"
          src="images/feet.png"
          data-aos="zoom-in"
          data-aos-duration="1000"
        />
        <div class="date-time wow flipInX" style="visibility: visible">
          <p>05 ՄԱՅԻՍԻ 2025</p>
          <p>16:00</p>
        </div>
        <img
          class="detail-4 aos-init"
          data-aos="zoom-in"
          data-aos-duration="1000"
          src="images/egg.png"
        />
        <div class="location">
          <p class="date-time wow flipInX">
            <span class="date-time wow flipInX" style="color: #f68e77"
              >Good Time</span
            >
            մանկական սրճարանում
          </p>
          <p class="place-address">
            <a
              href="https://yandex.com/maps"
              target="_blank"
              style="color: #333"
            >
              <img class="location-img" src="images/location.png" />
              Հասցե՝ Հալաբյան 35
            </a>
          </p>
        </div>
        <div class="d-flex justify-content-center align-items-center">
          <img
            class="detail-left-right aos-init"
            src="images/feet.png"
            data-aos="fade-right"
            data-aos-duration="1000"
          />
          <p class="footer-text wow flipInX" style="visibility: visible">
            ՍԻՐՈՎ ՍՊԱՍՈՒՄ ԵՆՔ
          </p>
          <img
            class="detail-left-right aos-init"
            src="images/feet.png"
            data-aos="fade-left"
            data-aos-duration="1000"
          />
        </div>
      </div>
    </section>

    <!-- 🦖 Dinos at bottom -->
    <img src="./images/dino1.png" class="dino dino-left" alt="Left Dino" />
    <img src="./images/dino2.png" class="dino dino-right" alt="Right Dino" />
    <script>
      // Disable right click
      document.addEventListener("contextmenu", function (e) {
        e.preventDefault();
      });

      // Disable key combinations
      document.addEventListener("keydown", function (e) {
        // F12
        if (e.keyCode === 123) {
          e.preventDefault();
        }

        // Ctrl+Shift+I / Cmd+Opt+I
        if (
          (e.ctrlKey && e.shiftKey && e.keyCode === 73) ||
          (e.metaKey && e.altKey && e.keyCode === 73)
        ) {
          e.preventDefault();
        }

        // Ctrl+Shift+J / Cmd+Opt+J
        if (
          (e.ctrlKey && e.shiftKey && e.keyCode === 74) ||
          (e.metaKey && e.altKey && e.keyCode === 74)
        ) {
          e.preventDefault();
        }

        // Ctrl+U / Cmd+U
        if (
          (e.ctrlKey && e.keyCode === 85) ||
          (e.metaKey && e.keyCode === 85)
        ) {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
